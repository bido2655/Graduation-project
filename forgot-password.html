<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Forgot Password - Diagram AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="theme.css">
    <style>
        .glass {
            backdrop-filter: blur(8px);
            background: rgba(30, 30, 30, 0.6);
        }

        body {
            background: radial-gradient(circle at top, #0f172a, #1e1e2f, #111);
            color: #f8fafc;
        }

        .neon-border {
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.7), inset 0 0 8px rgba(139, 92, 246, 0.6);
        }

        .neon-text {
            color: #c4b5fd;
            text-shadow: 0 0 6px #818cf8, 0 0 12px #6366f1;
        }

        .btn-glow:hover {
            box-shadow: 0 0 10px #6366f1, 0 0 20px #a855f7;
        }
    </style>
</head>

<body class="min-h-screen text-gray-100 flex flex-col">
    <header class="max-w-7xl mx-auto w-full p-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="main.html" class="flex items-center gap-4">
                <div>
                    <h1 class="text-3xl font-bold neon-text">Diagram AI</h1>
                    <p class="text-sm text-indigo-300">Syntax To Structure</p>
                </div>
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 pb-12">
        <section class="max-w-md w-full space-y-8 bg-gray-900/40 p-8 rounded-xl neon-border">
            <div id="step1">
                <div class="text-center">
                    <h2 class="text-3xl font-bold neon-text">Forgot Password</h2>
                    <p class="mt-2 text-sm text-indigo-300">Enter your email to receive a reset PIN</p>
                </div>
                <form id="forgotForm" class="mt-8 space-y-6">
                    <div>
                        <label for="email" class="text-sm font-medium text-indigo-300">Email Address</label>
                        <input id="email" name="email" type="email" required
                            class="mt-1 w-full rounded-md bg-gray-800 text-gray-200 border-indigo-700 shadow-sm p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                            placeholder="Enter your email">
                    </div>
                    <div>
                        <button type="submit"
                            class="w-full px-4 py-3 bg-indigo-600 text-white rounded-md shadow-md hover:bg-indigo-700 btn-glow font-semibold transition-all">
                            Send Reset PIN
                        </button>
                    </div>
                </form>
            </div>

            <div id="step2" class="hidden">
                <div class="text-center">
                    <h2 class="text-3xl font-bold neon-text">Verify PIN</h2>
                    <p class="mt-2 text-sm text-indigo-300">Enter the 6-digit PIN sent to your email</p>
                </div>
                <form id="resetForm" class="mt-8 space-y-6">
                    <div class="space-y-4">
                        <div>
                            <label for="pin" class="text-sm font-medium text-indigo-300">6-Digit PIN</label>
                            <input id="pin" name="pin" type="text" maxlength="6" required
                                class="mt-1 w-full rounded-md bg-gray-800 text-gray-200 border-indigo-700 shadow-sm p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-center text-2xl tracking-[1rem] font-bold"
                                placeholder="000000">
                        </div>
                        <div>
                            <label for="new-password" class="text-sm font-medium text-indigo-300">New Password</label>
                            <input id="new-password" name="new-password" type="password" required
                                class="mt-1 w-full rounded-md bg-gray-800 text-gray-200 border-indigo-700 shadow-sm p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                placeholder="Enter new password">
                        </div>
                    </div>
                    <div>
                        <button type="submit"
                            class="w-full px-4 py-3 bg-indigo-600 text-white rounded-md shadow-md hover:bg-indigo-700 btn-glow font-semibold transition-all">
                            Reset Password
                        </button>
                    </div>
                </form>
            </div>

            <div class="text-center text-sm">
                <p class="text-indigo-300">
                    Remembered your password?
                    <a href="login.html" class="font-medium text-indigo-400 hover:text-indigo-300">Back to Login</a>
                </p>
            </div>
        </section>
    </main>

    <footer class="max-w-7xl mx-auto w-full p-6 text-center text-xs text-indigo-400">
        Made By ⚡ Rashad, Omar, Abdelrahman, Mohamed.
    </footer>
    <script>
        let userEmail = '';

        // Step 1: Send PIN
        document.getElementById('forgotForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            userEmail = document.getElementById('email').value;

            try {
                const response = await fetch('http://127.0.0.1:8002/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });

                if (response.ok) {
                    showToast('PIN sent to your email!', 'success');
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                } else {
                    const data = await response.json().catch(() => ({}));
                    showToast(data.detail || 'Error sending PIN. Please check your email.', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Connection failed. Make sure the backend is running on port 8002.', 'error');
            }
        });

        // Step 2: Reset Password
        document.getElementById('resetForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const pin = document.getElementById('pin').value;
            const new_password = document.getElementById('new-password').value;

            try {
                const response = await fetch('http://127.0.0.1:8002/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: userEmail,
                        pin: pin,
                        new_password: new_password
                    })
                });

                if (response.ok) {
                    showToast('Password reset successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    const data = await response.json().catch(() => ({}));
                    showToast(data.detail || 'Reset failed. Check your PIN.', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Connection failed. Make sure the backend is running on port 8002.', 'error');
            }
        });

        function showToast(message, type = 'success') {
            const existingToast = document.getElementById('custom-toast');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.className = `fixed top-10 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-2xl z-[100] transition-all duration-300 neon-border glass flex items-center gap-3 animate-bounce`;

            const icon = type === 'success' ?
                '<svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' :
                '<svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';

            toast.innerHTML = `
                ${icon}
                <span class="text-white font-medium">${message}</span>
            `;

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-10');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
    <script src="theme-toggle.js"></script>
</body>

</html>
