<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Diagram History - Diagram AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="theme.css">
    <style>
        .glass {
            backdrop-filter: blur(8px);
            background: rgba(30, 30, 30, 0.6);
        }

        body {
            background: radial-gradient(circle at top, #0f172a, #1e1e2f, #111);
            color: #f8fafc;
        }

        .neon-border {
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.7), inset 0 0 8px rgba(139, 92, 246, 0.6);
        }

        .neon-text {
            color: #c4b5fd;
            text-shadow: 0 0 6px #818cf8, 0 0 12px #6366f1;
        }

        .btn-glow:hover {
            box-shadow: 0 0 10px #6366f1, 0 0 20px #a855f7;
        }

        .card-glow:hover {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(30, 30, 45, 0.5);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4f46e5;
            border-radius: 10px;
        }
    </style>
</head>

<body class="min-h-screen text-gray-100 flex flex-col custom-scrollbar">
    <header class="max-w-7xl mx-auto w-full p-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="main.html" class="flex items-center gap-4">
                <div>
                    <h1 class="text-3xl font-bold neon-text">Diagram AI</h1>
                    <p class="text-sm text-indigo-300">Syntax To Structure</p>
                </div>
            </a>
        </div>
        <div class="flex items-center gap-4">
            <div id="userProfile" class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-xs text-indigo-400">Project History for</p>
                    <p id="displayUsername" class="text-sm font-bold neon-text"></p>
                </div>
                <a href="main.html"
                    class="px-4 py-2 bg-indigo-600 text-white rounded-md shadow-md hover:bg-indigo-700 btn-glow text-sm font-semibold transition-all">
                    New Project
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full px-6 pb-12 flex-1">
        <div class="text-center mb-10">
            <h2 class="text-4xl font-extrabold neon-text uppercase tracking-widest">Diagram History</h2>
            <p class="mt-2 text-indigo-300">View and manage your previously generated diagrams</p>
        </div>

        <!-- Filters & Search -->
        <div
            class="flex flex-wrap items-center justify-between gap-4 mb-8 bg-gray-900/40 p-4 rounded-xl border border-indigo-900/50">
            <div class="flex items-center gap-4 flex-1 min-w-[300px]">
                <div class="relative flex-1">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </span>
                    <input id="searchInput" type="text" placeholder="Search diagrams..."
                        class="block w-full pl-10 pr-3 py-2 border border-indigo-700 rounded-md leading-5 bg-gray-800 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition duration-150 ease-in-out">
                </div>
                <select id="typeFilter"
                    class="bg-gray-800 border border-indigo-700 text-gray-200 text-sm rounded-md focus:ring-indigo-500 focus:border-indigo-500 block p-2">
                    <option value="all">All Types</option>
                    <option value="class">Class Diagram</option>
                    <option value="sequence">Sequence Diagram</option>
                    <option value="usecase">Use Case</option>
                    <option value="erd">ERD</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <button
                    class="px-4 py-2 border border-indigo-700 rounded-md text-sm text-indigo-300 hover:bg-indigo-900/30 flex items-center gap-2 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 4.5h18m-18 5h18m-18 5h18m-18 5h18"></path>
                    </svg>
                    Filter
                </button>
                <button
                    class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-md text-sm text-gray-300 hover:bg-gray-700 flex items-center gap-2 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                    Export All
                </button>
            </div>
        </div>

        <!-- History Grid -->
        <div id="historyGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loading State -->
            <div id="loadingState" class="col-span-full py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500">
                </div>
                <p class="mt-4 text-indigo-300">Retrieving your projects...</p>
            </div>
        </div>

        <!-- Pagination -->
        <div id="paginationContainer"
            class="mt-12 flex items-center justify-between border-t border-indigo-900/50 pt-6">
            <button id="prevBtn"
                class="px-4 py-2 border border-indigo-700 rounded-md text-sm text-indigo-300 hover:bg-indigo-900/30 transition-all flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Previous
            </button>
            <div id="pageNumbers" class="flex items-center gap-2">
                <!-- Dynamic Page Numbers -->
            </div>
            <button id="nextBtn"
                class="px-4 py-2 border border-indigo-700 rounded-md text-sm text-indigo-300 hover:bg-indigo-900/30 transition-all flex items-center gap-2 text-right disabled:opacity-50 disabled:cursor-not-allowed">
                Next
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </div>
    </main>

    <footer class="max-w-7xl mx-auto w-full p-6 text-center text-xs text-indigo-400 border-t border-indigo-900/20">
        Made By ⚡ Rashad, Omar, Abdelrahman, Mohamed.
    </footer>

    <script>
        let currentUser = null;
        let allDiagrams = [];
        let filteredDiagrams = [];
        let currentPage = 1;
        const pageSize = 6;

        async function init() {
            const userData = localStorage.getItem('user');
            if (!userData) {
                window.location.href = 'login.html';
                return;
            }

            currentUser = JSON.parse(userData);
            document.getElementById('displayUsername').textContent = currentUser.username;

            await loadHistory();
        }

        async function loadHistory() {
            const grid = document.getElementById('historyGrid');
            try {
                const response = await fetch(`http://127.0.0.1:8002/diagrams/user/${currentUser.id}`);
                if (!response.ok) throw new Error('Failed to fetch history');

                allDiagrams = await response.json();
                filteredDiagrams = [...allDiagrams];
                renderPage();
            } catch (error) {
                console.error('History fetch error:', error);
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <p class="text-red-400">Failed to load history. Make sure server is running.</p>
                        <button onclick="loadHistory()" class="mt-4 px-4 py-2 bg-indigo-600 rounded text-sm">Try Again</button>
                    </div>
                `;
            }
        }

        function renderPage() {
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageItems = filteredDiagrams.slice(startIndex, endIndex);

            renderGrid(pageItems);
            renderPagination();
        }

        function renderGrid(diagrams) {
            const grid = document.getElementById('historyGrid');
            grid.innerHTML = '';

            if (diagrams.length === 0 && allDiagrams.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center bg-gray-900/20 rounded-xl border-2 border-dashed border-indigo-900/30">
                        <div class="w-20 h-20 bg-indigo-900/20 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="w-10 h-10 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        </div>
                        <h3 class="text-xl font-bold text-indigo-200">Generate More</h3>
                        <p class="text-indigo-400 mt-2">Create new diagrams to see them here</p>
                        <a href="main.html" class="mt-6 inline-block px-6 py-2 bg-indigo-600 text-white rounded-md font-semibold btn-glow transition-all">Generate Diagram</a>
                    </div>
                `;
                return;
            }

            diagrams.forEach(diag => {
                const card = document.createElement('div');
                card.className = 'bg-gray-900/60 p-6 rounded-xl border border-indigo-900/50 flex flex-col gap-4 neon-border transition-all duration-300 card-glow relative';

                let typeColor = 'bg-indigo-600/30 text-indigo-300';
                if (diag.diagram_type === 'sequence') typeColor = 'bg-purple-600/30 text-purple-300';
                if (diag.diagram_type === 'usecase') typeColor = 'bg-pink-600/30 text-pink-300';
                if (diag.diagram_type === 'erd') typeColor = 'bg-blue-600/30 text-blue-300';

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] uppercase font-bold tracking-widest px-2 py-1 rounded ${typeColor} border border-white/5">${diag.diagram_type}</span>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold neon-text truncate">${diag.title}</h3>
                        <p class="mt-2 text-sm text-indigo-200/60 line-clamp-3 min-h-[4.5rem]">${diag.description || 'No description provided.'}</p>
                    </div>
                    <div class="flex items-center justify-between text-[11px] text-indigo-400/80 border-t border-indigo-900/30 pt-4">
                        <span>Generated: ${timeAgo(diag.created_at)}</span>
                        <span>Language: <span class="text-indigo-300 uppercase">${diag.language || 'N/A'}</span></span>
                    </div>
                    <div class="flex gap-2 mt-2">
                        <button onclick="viewDiagram(${diag.id})" class="flex-1 px-4 py-2 border border-indigo-600 rounded text-sm font-semibold text-indigo-200 hover:bg-indigo-600 hover:text-white transition-all">View</button>
                    </div>
                `;
                grid.appendChild(card);
            });

            // "Generate More" card only on the last page if there's space or if no results
            const totalPages = Math.ceil(filteredDiagrams.length / pageSize);
            if (currentPage === totalPages || totalPages === 0) {
                const generateCard = document.createElement('div');
                generateCard.className = 'p-6 rounded-xl border-2 border-dashed border-indigo-900/30 flex flex-col items-center justify-center text-center gap-4 bg-gray-900/20 card-glow transition-all duration-300';
                generateCard.innerHTML = `
                    <div class="w-12 h-12 bg-indigo-900/20 rounded-full flex items-center justify-center text-indigo-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-indigo-200">Generate More</h3>
                    </div>
                    <a href="main.html" class="w-full py-2 bg-indigo-600/80 text-white rounded font-bold text-sm tracking-wide hover:bg-indigo-600 transition-all">Generate Diagram</a>
                `;
                grid.appendChild(generateCard);
            }
        }

        function renderPagination() {
            const pageNumbersContainer = document.getElementById('pageNumbers');
            const totalPages = Math.ceil(filteredDiagrams.length / pageSize);

            pageNumbersContainer.innerHTML = '';

            if (totalPages <= 1) {
                document.getElementById('paginationContainer').classList.add('hidden');
                return;
            }

            document.getElementById('paginationContainer').classList.remove('hidden');

            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `px-4 py-2 rounded-md text-sm font-bold transition-all ${i === currentPage ? 'bg-indigo-600 text-white shadow-md' : 'text-indigo-400 hover:text-indigo-200'}`;
                pageBtn.textContent = i;
                pageBtn.onclick = () => {
                    currentPage = i;
                    renderPage();
                };
                pageNumbersContainer.appendChild(pageBtn);
            }

            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        document.getElementById('prevBtn').onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                renderPage();
            }
        };

        document.getElementById('nextBtn').onclick = () => {
            const totalPages = Math.ceil(filteredDiagrams.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderPage();
            }
        };

        function viewDiagram(id) {
            const diagram = allDiagrams.find(d => d.id === id);
            if (!diagram) return;
            localStorage.setItem('loaded_project', JSON.stringify(diagram));
            window.location.href = 'main.html';
        }

        // Filtering & Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            filteredDiagrams = allDiagrams.filter(d =>
                d.title.toLowerCase().includes(term) ||
                (d.description && d.description.toLowerCase().includes(term))
            );
            currentPage = 1;
            renderPage();
        });

        document.getElementById('typeFilter').addEventListener('change', (e) => {
            const type = e.target.value;
            if (type === 'all') {
                filteredDiagrams = [...allDiagrams];
            } else {
                filteredDiagrams = allDiagrams.filter(d => d.diagram_type === type);
            }
            currentPage = 1;
            renderPage();
        });

        function timeAgo(dateString) {
            const date = new Date(dateString.replace(' ', 'T'));
            const now = new Date();
            const diffInSeconds = Math.floor((now - date) / 1000);
            if (diffInSeconds < 60) return 'Just now';
            const diffInMinutes = Math.floor(diffInSeconds / 60);
            if (diffInMinutes < 60) return `${diffInMinutes}m ago`;
            const diffInHours = Math.floor(diffInMinutes / 60);
            if (diffInHours < 24) return `${diffInHours}h ago`;
            const diffInDays = Math.floor(diffInHours / 24);
            if (diffInDays < 7) return `${diffInDays}d ago`;
            return date.toLocaleDateString();
        }

        init();
    </script>
    <script src="theme-toggle.js"></script>
</body>

</html>
